    <style>
        :root {
            --main-bg: #0b0b0b; 
            --card-bg: #151515;      
            --accent: #ff8c00;  
            --text: #ffffff;    
            --sub-text: #777; 
        }

        body { font-family: 'Roboto', sans-serif; background: var(--main-bg); color: var(--text); margin: 0; padding: 0; }
        
        header { background: var(--card-bg); padding: 20px; text-align: center; border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        header h1 { margin: 0; font-size: 24px; letter-spacing: 5px; color: var(--accent); font-weight: 900; text-transform: uppercase; }

        main { padding: 15px; max-width: 800px; margin: auto; }

        .section-title { font-size: 14px; text-transform: uppercase; color: var(--accent); margin: 25px 0 15px; border-left: 4px solid var(--accent); padding-left: 12px; font-weight: bold; letter-spacing: 1px; }

        /* Grid de Cassino */
        .casino-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .game-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid #222; transition: 0.3s; text-decoration: none; display: block; }
        .game-card:active { transform: scale(0.96); border-color: var(--accent); }
        
        .game-img { width: 100%; height: 130px; background-size: cover; background-position: center; position: relative; }
        .play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--accent); color: black; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 11px; text-transform: uppercase; box-shadow: 0 0 10px rgba(255,140,0,0.5); }

        .game-info { padding: 12px; text-align: center; font-size: 13px; font-weight: bold; color: white; }
        .provider-name { font-size: 9px; color: var(--accent); display: block; margin-bottom: 3px; }

        /* Rodapé */
        footer { text-align: center; padding: 40px; font-size: 11px; color: var(--sub-text); border-top: 1px solid #1a1a1a; margin-top: 30px; }
        .deposit-btn { display: block; background: var(--accent); color: #000; padding: 15px; border-radius: 8px; text-decoration: none; margin-top: 20px; font-weight: bold; text-align: center; text-transform: uppercase; }
    </style>
</head>
