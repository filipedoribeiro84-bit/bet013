<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bet013 - Sports & Casino</title>
    <style>
        :root {
            --main-bg: #0f0f0f; 
            --card-bg: #181818;      
            --accent: #ff8c00;  
            --text: #ffffff;    
            --sub-text: #888; 
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--main-bg); color: var(--text); margin: 0; padding: 0; }
        
        header { background: var(--card-bg); padding: 15px; text-align: center; border-bottom: 3px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        header h1 { margin: 0; font-size: 22px; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; }

        main { padding: 15px; max-width: 900px; margin: auto; }

        .section-title { font-size: 16px; text-transform: uppercase; color: var(--accent); margin: 25px 0 15px; border-left: 3px solid var(--accent); padding-left: 10px; font-weight: bold; }

        /* Estilo Cassino Slots (PG / Pragmatic) */
        .casino-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .game-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #222; transition: 0.3s; position: relative; }
        .game-card:active { transform: scale(0.95); border-color: var(--accent); }
        .game-img { width: 100%; height: 140px; background-size: cover; background-position: center; filter: brightness(0.8); }
        .game-info { padding: 10px; text-align: center; font-size: 14px; font-weight: bold; background: rgba(0,0,0,0.6); }
        .provider-tag { font-size: 9px; color: var(--accent); display: block; margin-bottom: 4px; }

        /* Estilo Apostas Esportivas */
        .match-card { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #222; }
        .match-header { display: flex; justify-content: space-between; font-size: 11px; color: var(--sub-text); margin-bottom: 10px; }
        .match-teams { display: flex; justify-content: space-around; align-items: center; font-weight: bold; margin-bottom: 15px; }
        .odds-row { display: flex; gap: 8px; }
        .odd-btn { flex: 1; background: #222; border: 1px solid #333; color: var(--accent); padding: 10px; border-radius: 6px; text-align: center; font-size: 14px; cursor: pointer; }
        .odd-btn span { display: block; font-size: 9px; color: var(--sub-text); }

        footer { text-align: center; padding: 30px; font-size: 10px; color: var(--sub-text); border-top: 1px solid #222; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <h1>B E T 0 1 3</h1>
</header>

<main>
    <div class="section-title">Popular Casino Slots</div>
    <div class="casino-grid">
        <div class="game-card" onclick="openGame('Fortune Tiger')">
            <div class="game-img" style="background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRz-M6L7W-z5m8l9aGzB-iYI-9kL5hA5Z3xUA&s');"></div>
            <div class="game-info">
                <span class="provider-tag">PG SOFT</span>
                Fortune Tiger
            </div>
        </div>

        <div class="game-card" onclick="openGame('Gates of Olympus')">
            <div class="game-img" style="background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT6f8Xv7H_yC1Yq_Jv-J_Y_6Q_K_2_K_L_Z_A&s');"></div>
            <div class="game-info">
                <span class="provider-tag">PRAGMATIC</span>
                Gates of Olympus
            </div>
        </div>
    </div>

    <div class="section-title">Featured Sports</div>
    <div id="sports-list">
        <div class="match-card">
            <div class="match-header"><span>Copa Libertadores</span><span>LIVE</span></div>
            <div class="match-teams"><span>SANTOS</span><span style="color:var(--accent)">VS</span><span>PEÑAROL</span></div>
            <div class="odds-row">
                <div class="odd-btn">1.95<span>HOME</span></div>
                <div class="odd-btn">3.10<span>DRAW</span></div>
                <div class="odd-btn">4.50<span>AWAY</span></div>
            </div>
        </div>
    </div>
</main>

<footer>
    BET013 PLATFORM v2.0 - 2026<br>
    Responsibility & Entertainment
</footer>

<script>
    function openGame(name) {
        alert("Redirecting to " + name + "...\n(Login required to play with balance)");
    }
</script>

</body>
</html>
