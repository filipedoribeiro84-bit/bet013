<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BET013 - CASSINO COMPLETO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --accent: #ff8c00; --bg: #050505; --card: #121212; --green: #28a745; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; padding-bottom: 60px; overflow-x: hidden; }
        
        header { padding: 15px; text-align: center; background: #111; border-bottom: 2px solid var(--accent); }
        .logo { width: 60px; border-radius: 50%; }

        .btn-pix { background: var(--green); color: white; text-decoration: none; display: block; padding: 15px; border-radius: 8px; font-weight: bold; margin: 10px; text-align: center; animation: pulse 2s infinite; font-size: 14px; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(40, 167, 69, 0); } 100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); } }

        .section-title { padding: 15px; font-size: 14px; color: var(--accent); font-weight: bold; background: #0f0f0f; margin-top: 10px; border-left: 4px solid var(--accent); display: flex; justify-content: space-between; }

        /* Grade Infinita */
        .slots-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; }
        .slot-card { background: var(--card); border-radius: 8px; padding: 5px; border: 1px solid #222; position: relative; text-align: center; font-size: 10px; }
        .slot-card img { width: 100%; border-radius: 5px; height: 80px; object-fit: cover; background: #1a1a1a; }
        .op-tag { position: absolute; top: 2px; left: 2px; background: rgba(0,0,0,0.8); font-size: 7px; padding: 2px; border-radius: 2px; color: #aaa; }
        .play-small { background: var(--accent); color: black; text-decoration: none; display: block; padding: 5px 0; border-radius: 4px; font-weight: bold; margin-top: 5px; }

        /* Barra de Navegação Inferior (Estilo App Profissional) */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; }
        .nav-item { color: #888; font-size: 10px; text-decoration: none; text-align: center; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <img src="https://raw.githubusercontent.com/filiperibeiro84-bit/bet013/main/logo.png" class="logo">
        <div style="font-size: 12px; font-weight: bold;">BET013 CASINO</div>
    </header>

    <a href="https://333bet.com/?id=18324680" class="btn-pix">💰 DEPOSITAR VIA PIX</a>

    <div class="section-title">🎰 PG SOFT <span>Ver Tudo</span></div>
    <div id="pg-slots" class="slots-grid">
        </div>

    <div class="section-title">💎 PRAGMATIC PLAY <span>HOT</span></div>
    <div id="pragmatic-slots" class="slots-grid">
        </div>

    <div class="section-title">🃏 TADA GAMING <span>NOVO</span></div>
    <div id="tada-slots" class="slots-grid">
        </div>

    <div class="nav-bar">
        <a href="#" class="nav-item active">🏠<br>Início</a>
        <a href="https://333bet.com/?id=18324680" class="nav-item">🎰<br>Slots</a>
        <a href="https://333bet.com/?id=18324680" class="nav-item">⚽<br>Esportes</a>
        <a href="https://333bet.com/?id=18324680" class="nav-item">👤<br>Conta</a>
    </div>

    <script>
        // Função para gerar muitos slots automaticamente
        function createSlots(containerId, providerName, count, startSeed) {
            const container = document.getElementById(containerId);
            const games = ["Fortune Tiger", "Fortune Ox", "Gates of Olympus", "Sugar Rush", "Aviator", "Mines", "Crazy Time", "Sweet Bonanza", "Big Bass", "Joker"];
            
            for (let i = 0; i < count; i++) {
                const gameName = games[Math.floor(Math.random() * games.length)] + " " + (i + 1);
                const seed = startSeed + i;
                container.innerHTML += `
                    <div class="slot-card">
                        <span class="op-tag">${providerName}</span>
                        <img src="https://picsum.photos/seed/${seed}/200/200" alt="Game">
                        <div style="margin:4px 0; overflow:hidden; white-space:nowrap;">${gameName}</div>
                        <a href="https://333bet.com/?id=18324680" class="play-small">JOGAR</a>
                    </div>
                `;
            }
        }

        // Criando 15 slots para cada operadora (total 45 visíveis de cara)
        // Você pode aumentar esse número, mas 15 de cada já enche a tela!
        createSlots('pg-slots', 'PG SOFT', 15, 100);
        createSlots('pragmatic-slots', 'PRAGMATIC', 15, 200);
        createSlots('tada-slots', 'TADA', 15, 300);
    </script>
</body>
</html>
