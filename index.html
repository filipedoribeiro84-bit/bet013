<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bet013 - Betting Alchemy</title>
    <style>
        /* Global Styles - Dark Theme & Bet013 Orange */
        :root {
            --main-bg: #121212; 
            --card-bg: #1e1e1e;      
            --accent-color: #ff8c00;  
            --text-color: #e0e0e0;    
            --sub-text: #a0a0a0; 
            --card-border: #333;      
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--main-bg);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Top Navigation Bar */
        header {
            width: 100%;
            background-color: var(--card-bg);
            padding: 15px 0;
            text-align: center;
            border-bottom: 2px solid var(--accent-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(255, 140, 0, 0.5);
        }

        /* Main Container */
        main {
            width: 90%;
            max-width: 800px;
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Section Title */
        .section-title {
            font-size: 18px;
            color: var(--sub-text);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
            margin-bottom: 10px;
        }

        /* Professional Match Card */
        .match-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .match-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(255, 140, 0, 0.2);
            border-color: var(--accent-color);
        }

        /* Card Header (League & Date) */
        .match-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--sub-text);
            text-transform: uppercase;
        }

        /* Teams Area */
        .match-teams {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 20px;
            font-weight: bold;
        }

        .team-name {
            flex: 1;
            text-align: center;
        }

        .vs-label {
            color: var(--accent-color);
            font-size: 16px;
        }

        /* Odds Buttons Area */
        .match-odds {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .odd-button {
            flex: 1;
            background-color: var(--main-bg);
            border: 1px solid var(--card-border);
            color: var(--accent-color);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            transition: background 0.2s, color 0.2s;
        }

        .odd-button:hover {
            background-color: var(--accent-color);
            color: #000;
        }

        .odd-value {
            font-size: 18px;
        }

        .odd-label {
            font-size: 10px;
            color: var(--sub-text);
            text-transform: uppercase;
            display: block;
        }

        /* Footer */
        footer {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            color: var(--sub-text);
            font-size: 12px;
            border-top: 1px solid var(--card-border);
            margin-top: auto;
        }
    </style>
</head>
<body>

    <header>
        <h1>B E T 0 1 3</h1>
    </header>

    <main>
        <div class="section-title">Featured Matches</div>

        <div class="match-card" onclick="placeBet('Santos vs Palmeiras', '1.85')">
            <div class="match-header">
                <span>Brazilian Serie A</span>
                <span>Today - 16:00</span>
            </div>
            <div class="match-teams">
                <span class="team-name">Santos</span>
                <span class="vs-label">VS</span>
                <span class="team-name">Palmeiras</span>
            </div>
            <div class="match-odds">
                <div class="odd-button">
                    <span class="odd-value">1.85</span>
                    <span class="odd-label">Home</span>
                </div>
                <div class="odd-button">
                    <span class="odd-value">3.40</span>
                    <span class="odd-label">Draw</span>
                </div>
                <div class="odd-button">
                    <span class="odd-value">4.20</span>
                    <span class="odd-label">Away</span>
                </div>
            </div>
        </div>

        <div class="match-card" onclick="placeBet('Corinthians vs Sao Paulo', '2.10')">
            <div class="match-header">
                <span>Brazil Cup</span>
                <span>Tomorrow - 21:30</span>
            </div>
            <div class="match-teams">
                <span class="team-name">Corinthians</span>
                <span class="vs-label">VS</span>
                <span class="team-name">Sao Paulo</span>
            </div>
            <div class="match-odds">
                <div class="odd-button">
                    <span class="odd-value">2.10</span>
                    <span class="odd-label">Home</span>
                </div>
                <div class="odd-button">
                    <span class="odd-value">3.10</span>
                    <span class="odd-label">Draw</span>
                </div>
                <div class="odd-button">
                    <span class="odd-value">3.80</span>
                    <span class="odd-label">Away</span>
                </div>
            </div>
        </div>

    </main>

    <footer>
        &copy; 2026 Bet013 - Counter Alchemy. All rights reserved.
    </footer>

    <script>
        function placeBet(match, odd) {
            alert("Bet Initiated!\nMatch: " + match + "\nOdd: " + odd + "\n\nConnect Firebase to process real bets.");
        }
    </script>
</body>
</html>
