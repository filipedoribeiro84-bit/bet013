<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BET013 - CASSINO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --accent: #ff8c00; --bg: #050505; --card: #121212; --green: #00ff00; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        
        header { padding: 15px; text-align: center; background: #111; border-bottom: 2px solid var(--accent); }
        .logo { width: 60px; border-radius: 50%; box-shadow: 0 0 15px var(--accent); }

        /* Botão PIX - Link de Convite Ajustado */
        .btn-pix { background: var(--green); color: black; text-decoration: none; display: block; padding: 15px; border-radius: 8px; font-weight: 900; margin: 10px; text-align: center; font-size: 16px; border-bottom: 4px solid #008000; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

        .section-title { padding: 12px; font-size: 13px; color: var(--accent); font-weight: bold; background: #0f0f0f; margin-top: 5px; border-left: 4px solid var(--accent); display: flex; justify-content: space-between; }

        /* Grade de 3 Colunas Real */
        .slots-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 10px; }
        .slot-card { background: var(--card); border-radius: 8px; padding: 5px; border: 1px solid #222; position: relative; text-align: center; font-size: 9px; min-height: 130px; }
        .slot-card img { width: 100%; border-radius: 5px; height: 80px; object-fit: cover; background: #1a1a1a; }
        .op-tag { position: absolute; top: 3px; left: 3px; background: rgba(0,0,0,0.8); font-size: 7px; padding: 1px 4px; border-radius: 2px; color: #fff; border: 0.5px solid var(--accent); }
        .play-btn { background: var(--accent); color: black; text-decoration: none; display: block; padding: 5px 0; border-radius: 4px; font-weight: bold; margin-top: 5px; font-size: 10px; }

        /* Rodapé Fixo */
        .footer-nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 999; }
        .nav-link { color: #888; font-size: 10px; text-decoration: none; text-align: center; }
    </style>
</head>
<body>

    <header>
        <img src="https://raw.githubusercontent.com/filiperibeiro84-bit/bet013/main/logo.png" class="logo">
    </header>

    <a href="https://333bet.com/register?id=18324680&currency=BRL" class="btn-pix">⚡ DEPOSITAR VIA PIX ⚡</a>

    <div class="section-title">🎰 PG SOFT <span>QUENTE 🔥</span></div>
    <div id="pg-container" class="slots-grid"></div>

    <div class="section-title">💎 PRAGMATIC PLAY <span>TOP</span></div>
    <div id="prag-container" class="slots-grid"></div>

    <div class="section-title">🃏 TADA GAMING <span>NOVOS</span></div>
    <div id="tada-container" class="slots-grid"></div>

    <div class="footer-nav">
        <a href="#" class="nav-link" style="color:var(--accent)">🏠<br>Início</a>
        <a href="https://333bet.com/register?id=18324680" class="nav-link">🎰<br>Slots</a>
        <a href="https://333bet.com/register?id=18324680" class="nav-link">⚽<br>Esportes</a>
        <a href="https://333bet.com/register?id=18324680" class="nav-link">👤<br>Minha Conta</a>
    </div>

    <script>
        function fillSlots(id, provider, startId) {
            const container = document.getElementById(id);
            const games = ["Tiger", "Ox", "Rabbit", "Mouse", "Dragon", "Snake", "Horse", "Goat", "Gold", "Wild", "Sugar", "Gates"];
            
            // Loop para criar muitos jogos de uma vez
            for(let i=0; i<15; i++) {
                const gameName = games[i % games.length] + " " + (i + 1);
                container.innerHTML += `
                    <div class="slot-card">
                        <span class="op-tag">${provider}</span>
                        <img src="https://picsum.photos/seed/${startId + i}/200/200">
                        <div style="margin:4px 0; font-weight:bold;">${gameName}</div>
                        <a href="https://333bet.com/register?id=18324680" class="play-btn">JOGAR</a>
                    </div>
                `;
            }
        }

        fillSlots('pg-container', 'PG SOFT', 101);
        fillSlots('prag-container', 'PRAGMATIC', 201);
        fillSlots('tada-container', 'TADA', 301);
    </script>
</body>
</html>
